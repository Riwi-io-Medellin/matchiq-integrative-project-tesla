<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Nueva contraseña — MatchIQ</title>
  <link rel="stylesheet" href="../src/styles/login.css" />
</head>
<body>
  <div class="bg">
    <div class="topbar">
      <a href="./login.html" class="brand">
        <img src="../src/assets/iconoMatchIQ-Imag.png" class="brand__logo" alt="MatchIQ" />
        <span class="brand__name">MatchIQ</span>
      </a>
    </div>
    <div class="page">
      <div class="auth">
        <div class="auth__head">
          <h1>Nueva contraseña</h1>
          <p>Ingresa tu nueva contraseña.</p>
        </div>
        <div class="card">

          <div class="alert is-error" id="invalidToken" hidden>
            El enlace es inválido o ha expirado. <a href="./forgot-password.html" class="link">Solicita uno nuevo</a>.
          </div>

          <form id="resetForm">
            <div class="field">
              <label for="newPassword">Nueva contraseña</label>
              <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" />
              <p class="field__error" id="newPasswordError"></p>
            </div>

            <div class="field">
              <label for="confirmPassword">Confirmar contraseña</label>
              <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" />
              <p class="field__error" id="confirmPasswordError"></p>
            </div>

            <div class="alert" id="formAlert" hidden></div>

            <button type="submit" class="btn btn--primary" id="submitBtn">
              Guardar contraseña
            </button>
          </form>

          <div class="hint" style="margin-top: 20px;">
            <a href="./login.html" class="link">← Volver al login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="../src/pages/resetPassword.js"></script>
</body>
</html>
