<!-- ─── Dashboard View Fragment ─── -->
<header class="main__header">
    <div>
        <h1>Dashboard</h1>
        <p class="muted">Summary of your hiring activity.</p>
    </div>
    <div class="header__actions">
        <a href="#/offers/create" class="btn btn--primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
            </svg>
            New Offer
        </a>
    </div>
</header>

<!-- KPI Cards -->
<section class="kpis">
    <article class="kpi">
        <div class="kpi__label">Active Offers</div>
        <div class="kpi__value" id="kpi-active">0</div>
    </article>
    <article class="kpi">
        <div class="kpi__label">Total Offers</div>
        <div class="kpi__value" id="kpi-total">0</div>
    </article>
    <article class="kpi kpi--highlight">
        <div class="kpi__label">Closed</div>
        <div class="kpi__value" id="kpi-closed">0</div>
    </article>
</section>

<!-- Tabla de ofertas recientes -->
<section class="card">
    <div class="card__head">
        <h2>Recent Offers</h2>
        <a href="#/offers" class="link">View all →</a>
    </div>
    <div class="table-wrap">
        <table class="table">
            <thead>
                <tr>
                    <th>Position</th>
                    <th>Modality</th>
                    <th>Status</th>
                    <th class="th-right">Action</th>
                </tr>
            </thead>
            <tbody id="dashboard-table-body">
                <!-- JS renderiza filas aquí -->
            </tbody>
        </table>
    </div>
</section>
