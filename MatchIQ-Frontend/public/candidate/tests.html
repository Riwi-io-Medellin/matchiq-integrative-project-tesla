
<!-- ─── Tests Fragment ─── -->
<header class="main__header">
    <div>
        <h1>Pending Tests</h1>
        <p class="muted">Complete the tests that companies have sent you.</p>
    </div>
</header>

<!-- Tests List View -->
<section id="testsListView">
    <div class="summary-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px;">
        <article class="summary-card">
            <p class="summary-card__label">PENDING TESTS</p>
            <h3 class="summary-card__value" id="pendingCount">0</h3>
        </article>
        <article class="summary-card summary-card--highlight">
            <p class="summary-card__label">COMPLETED TESTS</p>
            <h3 class="summary-card__value" id="completedCount">0</h3>
        </article>
    </div>

    <div class="panel">
        <div class="panel__head">
            <div>
                <h3>Assigned tests</h3>
                <p>Click "Solve" to start a test.</p>
            </div>
        </div>
        <div id="testsContainer">
            <div class="empty-state">No pending tests.</div>
        </div>
    </div>
</section>

<!-- Test Taking View (hidden by default) -->
<section id="testTakingView" style="display: none;">
    <div class="test-header-bar">
        <button class="btn btn--ghost" id="backToListBtn">← Back</button>
        <div class="test-header-bar__info">
            <h3 id="testTitle">Test</h3>
            <span class="test-timer" id="testTimer">30:00</span>
        </div>
    </div>

    <div class="test-progress">
        <div class="test-progress__bar" id="testProgressBar" style="width: 0%"></div>
    </div>

    <div id="testQuestionsContainer">
        <!-- Questions rendered by JS -->
    </div>


    <!-- Navigation and submit rendered by JS inside testQuestionsContainer -->
</section>

<!-- Test Results View (hidden by default) -->
<section id="testResultsView" style="display: none;">
    <div class="panel" style="text-align: center; padding: 40px;">
        <div id="resultIcon" style="margin-bottom: 16px;"><svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="var(--emerald-dark)" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></div>
        <h2 id="resultTitle">Test Results</h2>
        <p class="page-subtitle" id="resultSubtitle" style="margin-bottom: 24px;"></p>

        <div class="summary-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px;">
            <article class="summary-card">
                <p class="summary-card__label">SCORE</p>
                <h3 class="summary-card__value" id="resultScore">—</h3>
            </article>
            <article class="summary-card">
                <p class="summary-card__label">CORRECT</p>
                <h3 class="summary-card__value" id="resultCorrect">—</h3>
            </article>
            <article class="summary-card summary-card--highlight">
                <p class="summary-card__label">ATTENTION</p>
                <h3 class="summary-card__value" id="resultAttention">—</h3>
            </article>
        </div>

        <button class="btn btn--primary" id="backToTestsBtn">Back to Tests</button>
    </div>
</section>
