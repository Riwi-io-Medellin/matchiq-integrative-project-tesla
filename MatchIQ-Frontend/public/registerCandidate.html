<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MatchIQ | Talent Registration</title>
  <link rel="stylesheet" href="../src/styles/registerCandidate.css" />
</head>

<body>
  <div class="bg">
    <main class="page">
      <section class="auth">

        <div class="auth__head">
          <img class="logo" src="../src/assets/iconoMatchIQ.png" alt="MatchIQ logo"/>
        </div>

        <p id="error-banner"   class="banner banner--error"   hidden></p>
        <p id="success-banner" class="banner banner--success" hidden></p>

        <form class="card">

          <div class="card__header">
            <h1 class="auth__title">Candidate Registration</h1>
            <p class="auth__subtitle">Create your talent account to discover job opportunities matched to your skills.</p>
          </div>

          <div class="section">
            <div class="field">
              <label for="email">Email Address</label>
              <input id="email" type="email" placeholder="email@example.com" required />
            </div>

            <div class="grid-2">
              <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="••••••••" required />
              </div>
              <div class="field">
                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword" type="password" placeholder="••••••••" required />
              </div>
            </div>
          </div>

          <div class="terms">
            <label class="checkbox">
              <input type="checkbox" required />
              <span>I accept <a href="#">the terms and conditions</a>.</span>
            </label>
          </div>

          <button class="btn btn--primary" id="submitBtn" type="submit">
            <span class="btn__text">Create Talent Account →</span>
            <span class="btn__spinner" aria-hidden="true"></span>
          </button>

          <div class="divider"></div>

          <a id="googleBtn" href="#" class="btn btn--google">
            <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.7 0 6.8 5.4 2.9 13.3l7.8 6C12.5 13 17.8 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z" />
              <path fill="#FBBC05" d="M10.7 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.5 10.8l8.2-6.1z"/>
              <path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.5-5.8c-2.1 1.4-4.8 2.3-8.4 2.3-6.2 0-11.5-4.2-13.4-9.9l-8.2 6.1C6.8 42.6 14.7 48 24 48z"/>
            </svg>
            Register with Google
          </a>

        </form>

        <p class="auth__footer">
          Already have an account? <a href="./login.html">Sign in</a>
        </p>

      </section>
    </main>
  </div>

  <script type="module" src="../src/pages/registerCandidate.js"></script>
</body>
</html>
