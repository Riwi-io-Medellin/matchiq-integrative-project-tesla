<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Recuperar contraseña — MatchIQ</title>
  <link rel="stylesheet" href="../src/styles/login.css" />
</head>
<body>
  <div class="bg">
    <div class="topbar">
      <a href="./login.html" class="brand">
        <img src="../src/assets/iconoMatchIQ-Imag.png" class="brand__logo" alt="MatchIQ" />
        <span class="brand__name">MatchIQ</span>
      </a>
    </div>
    <div class="page">
      <div class="auth">
        <div class="auth__head">
          <h1>Recuperar contraseña</h1>
          <p>Ingresa tu email y te enviaremos un enlace para restablecer tu contraseña.</p>
        </div>
        <div class="card">
          <form id="forgotForm">
            <div class="field">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="tu@email.com" autocomplete="email" />
              <p class="field__error" id="emailError"></p>
            </div>

            <div class="alert" id="formAlert" hidden></div>

            <div class="alert" id="successHint" hidden>
              Si el email está registrado, recibirás un enlace en breve. Revisa tu bandeja de entrada.
            </div>

            <button type="submit" class="btn btn--primary" id="submitBtn">
              Enviar enlace
            </button>
          </form>

          <div class="hint" style="margin-top: 20px;">
            <a href="./login.html" class="link">← Volver al login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="../src/pages/forgotPassword.js"></script>
</body>
</html>
